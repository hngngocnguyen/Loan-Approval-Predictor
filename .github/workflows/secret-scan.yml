name: Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  gitleaks:
    name: Scan repository for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
